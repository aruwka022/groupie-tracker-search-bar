<!doctype html>
<html>
  <head>
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  </head>
  <body>
    <header class="header">
      <div class="container">
        <div class="header-content">
          <a href="/" class="logo">🎵 Groupie Tracker</a>

          <div class="search-box" id="searchWrapper">
            <input
              type="text"
              class="search-input"
              placeholder="Search artists, members, locations..."
              id="searchInput"
              autocomplete="off"
              aria-label="Search"
              aria-autocomplete="list"
              aria-controls="suggestionsList"
              aria-expanded="false"
            />
            <button class="search-button" onclick="applySearch()">Search</button>
            <ul class="suggestions-list" id="suggestionsList" role="listbox"></ul>
          </div>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div class="container">
        <h1 class="page-title">Artists &amp; Bands</h1>

        <div class="filters">
          <select class="filter-select" id="creationFilter" onchange="filterArtists()">
            <option value="">All Years</option>
            {{range $year := getUniqueYears .Artists}}
            <option value="{{$year}}">{{$year}}</option>
            {{end}}
          </select>

          <select class="filter-select" id="membersFilter" onchange="filterArtists()">
            <option value="">Any Members</option>
            <option value="1">1 Member</option>
            <option value="2-4">2-4 Members</option>
            <option value="5-8">5-8 Members</option>
            <option value="9+">9+ Members</option>
          </select>
        </div>

        <div class="artists-grid" id="artistsGrid">
          {{range .Artists}}
          <a href="/artist/{{.ID}}" class="artist-link">
            <div class="artist-card">
              <img
                src="{{.Image}}"
                alt="{{.Name}}"
                class="artist-image"
                loading="lazy"
              />
              <div class="artist-info">
                <h3 class="artist-name">{{.Name}}</h3>
                <div class="artist-details">
                  <div class="artist-detail">Founded: {{.CreationDate}}</div>
                  <div class="artist-detail">First Album: {{.FirstAlbum}}</div>
                  <div class="artist-detail">{{len .Members}} Members</div>
                </div>
                <div class="members-section">
                  {{range .Members}}
                  <span class="member-tag">{{.}}</span>
                  {{end}}
                </div>
              </div>
            </div>
          </a>
          {{end}}
        </div>

        <div class="pagination" id="pagination">
          <button class="pagination-button" onclick="previousPage()" id="prevBtn">Previous</button>
          <span class="pagination-info" id="pageInfo">Page 1</span>
          <button class="pagination-button" onclick="nextPage()" id="nextBtn">Next</button>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <p>🎶 Groupie Tracker — {{len .Artists}} Artists</p>
      </div>
    </footer>

    <script>
      let currentPage = 1;
      const itemsPerPage = 12;
      let filteredArtists = [];
      let suggestDebounce = null;
      let activeIndex = -1;

      const searchInput = document.getElementById("searchInput");
      const suggestionsList = document.getElementById("suggestionsList");

      searchInput.addEventListener("input", function () {
        clearTimeout(suggestDebounce);
        const q = this.value.trim();
        if (q.length < 1) { hideSuggestions(); return; }
        suggestDebounce = setTimeout(function () { fetchSuggestions(q); }, 200);
      });

      searchInput.addEventListener("keydown", function (e) {
        const items = suggestionsList.querySelectorAll("li");
        if (!items.length) {
          if (e.key === "Enter") applySearch();
          return;
        }
        if (e.key === "ArrowDown") {
          e.preventDefault();
          activeIndex = Math.min(activeIndex + 1, items.length - 1);
          highlightItem(items);
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          activeIndex = Math.max(activeIndex - 1, -1);
          highlightItem(items);
        } else if (e.key === "Enter") {
          e.preventDefault();
          if (activeIndex >= 0 && items[activeIndex]) {
            items[activeIndex].click();
          } else {
            applySearch();
            hideSuggestions();
          }
        } else if (e.key === "Escape") {
          hideSuggestions();
        }
      });

      document.addEventListener("click", function (e) {
        if (!document.getElementById("searchWrapper").contains(e.target)) {
          hideSuggestions();
        }
      });

      function highlightItem(items) {
        items.forEach(function (li, i) {
          li.classList.toggle("suggestion-active", i === activeIndex);
        });
      }

      function fetchSuggestions(q) {
        fetch("/api/search?q=" + encodeURIComponent(q))
          .then(function (r) { return r.json(); })
          .then(function (suggestions) { renderSuggestions(suggestions, q); })
          .catch(function () { hideSuggestions(); });
      }

      function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      }

      function renderSuggestions(suggestions, q) {
        suggestionsList.innerHTML = "";
        activeIndex = -1;
        if (!suggestions || suggestions.length === 0) { hideSuggestions(); return; }

        suggestions.forEach(function (s) {
          const li = document.createElement("li");
          li.setAttribute("role", "option");
          const regex = new RegExp("(" + escapeRegex(q) + ")", "gi");
          const highlighted = s.label.replace(regex, "<mark>$1</mark>");
          li.innerHTML =
            '<span class="suggestion-label">' + highlighted + "</span>" +
            '<span class="suggestion-type">' + s.type + "</span>";
          li.addEventListener("mousedown", function (e) {
            e.preventDefault();
            searchInput.value = s.label;
            hideSuggestions();
            window.location.href = "/artist/" + s.artistId;
          });
          suggestionsList.appendChild(li);
        });

        suggestionsList.style.display = "block";
        searchInput.setAttribute("aria-expanded", "true");
      }

      function hideSuggestions() {
        suggestionsList.style.display = "none";
        suggestionsList.innerHTML = "";
        searchInput.setAttribute("aria-expanded", "false");
        activeIndex = -1;
      }

      function applySearch() {
        const query = searchInput.value.toLowerCase();
        const cards = document.querySelectorAll(".artist-card");
        filteredArtists = [];
        cards.forEach(function (card) {
          const name = card.querySelector(".artist-name").textContent.toLowerCase();
          const members = Array.from(card.querySelectorAll(".member-tag")).map(function (t) { return t.textContent.toLowerCase(); });
          const details = card.querySelector(".artist-details").textContent.toLowerCase();
          const matches = name.includes(query) || members.some(function (m) { return m.includes(query); }) || details.includes(query);
          if (matches) filteredArtists.push(card);
        });
        currentPage = 1;
        updatePagination();
      }

      function filterArtists() {
        const yearFilter = document.getElementById("creationFilter").value;
        const membersFilter = document.getElementById("membersFilter").value;
        const cards = document.querySelectorAll(".artist-card");
        filteredArtists = [];
        cards.forEach(function (card) {
          const yearText = card.querySelector(".artist-details .artist-detail:nth-child(1)").textContent;
          const year = yearText.replace("Founded: ", "");
          const membersCount = parseInt(card.querySelector(".artist-details .artist-detail:nth-child(3)").textContent);
          let yearMatch = !yearFilter || year === yearFilter;
          let membersMatch = true;
          if (membersFilter === "1") membersMatch = membersCount === 1;
          else if (membersFilter === "2-4") membersMatch = membersCount >= 2 && membersCount <= 4;
          else if (membersFilter === "5-8") membersMatch = membersCount >= 5 && membersCount <= 8;
          else if (membersFilter === "9+") membersMatch = membersCount >= 9;
          if (yearMatch && membersMatch) filteredArtists.push(card);
        });
        currentPage = 1;
        updatePagination();
      }

      function updatePagination() {
        const all = document.querySelectorAll(".artist-card");
        const pool = filteredArtists.length > 0 ? filteredArtists : Array.from(all);
        const totalPages = Math.ceil(pool.length / itemsPerPage);
        document.getElementById("pageInfo").textContent = "Page " + currentPage + " of " + (totalPages || 1);
        document.getElementById("prevBtn").disabled = currentPage === 1;
        document.getElementById("nextBtn").disabled = currentPage === totalPages || totalPages === 0;
        const start = (currentPage - 1) * itemsPerPage;
        all.forEach(function (c) { c.parentElement.style.display = "none"; });
        pool.slice(start, start + itemsPerPage).forEach(function (c) { c.parentElement.style.display = "block"; });
      }

      function nextPage() {
        const pool = filteredArtists.length > 0 ? filteredArtists : Array.from(document.querySelectorAll(".artist-card"));
        if (currentPage < Math.ceil(pool.length / itemsPerPage)) {
          currentPage++;
          updatePagination();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      }

      function previousPage() {
        if (currentPage > 1) {
          currentPage--;
          updatePagination();
          window.scrollTo({ top: 0, behavior: "smooth" });
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        filteredArtists = Array.from(document.querySelectorAll(".artist-card"));
        updatePagination();
        searchInput.addEventListener("keypress", function (e) {
          if (e.key === "Enter") { applySearch(); hideSuggestions(); }
        });
      });
    </script>
  </body>
</html>
